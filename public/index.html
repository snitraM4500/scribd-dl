<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribd Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
        }

        .subtitle {
            color: #7a7f95;
            font-size: 0.875rem;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #9095aa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            border-color: #4f6ef7;
        }

        input[type="text"]::placeholder {
            color: #3d4157;
        }

        button {
            margin-top: 16px;
            width: 100%;
            padding: 13px;
            background: #4f6ef7;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

        button:hover:not(:disabled) { background: #3d5de0; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .status {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .status.loading {
            align-items: center;
            gap: 12px;
            background: #1e2235;
            border: 1px solid #2a2d3a;
            color: #9095aa;
        }

        .status.error {
            background: #2a1a1a;
            border: 1px solid #5a2a2a;
            color: #f87171;
        }

        .status.success {
            background: #1a2a1a;
            border: 1px solid #2a5a2a;
            color: #86efac;
            text-align: center;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #2a2d3a;
            border-top-color: #4f6ef7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .download-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 24px;
            background: #22c55e;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
            width: auto;
        }

        .download-btn:hover { background: #16a34a; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Scribd Downloader</h1>
        <p class="subtitle">Paste a Scribd, SlideShare, or Everand URL to download.</p>

        <label for="url">Document URL</label>
        <input
            type="text"
            id="url"
            placeholder="https://www.scribd.com/doc/123456789/..."
            autocomplete="off"
            spellcheck="false"
        />

        <button id="downloadBtn" onclick="startDownload()">Download</button>

        <div class="status loading" id="statusLoading">
            <div class="spinner"></div>
            <span>Processing — this may take a minute...</span>
        </div>

        <div class="status error" id="statusError"></div>

        <div class="status success" id="statusSuccess">
            File ready!
            <br>
            <a class="download-btn" id="downloadLink" href="#">Save to device</a>
            <p style="margin-top:10px;font-size:0.8rem;color:#86efac;opacity:0.7;">The file will be removed from the server after saving.</p>
        </div>
    </div>

    <script>
        async function startDownload() {
            const url = document.getElementById('url').value.trim()
            if (!url) return

            setStatus('loading')

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                })

                if (!res.ok) {
                    const ct = res.headers.get('content-type') || ''
                    const msg = ct.includes('application/json')
                        ? (await res.json()).error
                        : await res.text()
                    setStatus('error', msg || 'An unknown error occurred.')
                    return
                }

                const data = await res.json()

                const link = document.getElementById('downloadLink')
                link.href = `/file/${encodeURIComponent(data.filename)}`
                link.download = data.filename
                link.textContent = `Save "${data.filename}" to device`

                setStatus('success')
            } catch (err) {
                setStatus('error', err.message)
            }
        }

        function setStatus(type, message) {
            const loading = document.getElementById('statusLoading')
            const error = document.getElementById('statusError')
            const success = document.getElementById('statusSuccess')
            const btn = document.getElementById('downloadBtn')

            loading.style.display = 'none'
            error.style.display = 'none'
            success.style.display = 'none'

            if (type === 'loading') {
                loading.style.display = 'flex'
                btn.disabled = true
            } else if (type === 'error') {
                error.style.display = 'block'
                error.textContent = message
                btn.disabled = false
            } else if (type === 'success') {
                success.style.display = 'block'
                btn.disabled = false
            }
        }

        // Allow pressing Enter to trigger download
        document.getElementById('url').addEventListener('keydown', e => {
            if (e.key === 'Enter') startDownload()
        })
    </script>
</body>
</html>
